<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>KALIWINKI MARAUDER • All Commands</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><style>body{font-family:'Courier New',monospace}.terminal{font-family:'Courier New',monospace;background:#0a0a0a}.btn{transition:all .2s}.btn:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(163,230,77,.6)}</style></head><body class="bg-zinc-950 text-zinc-100 min-h-screen"><div class="flex h-screen"><div class="w-[420px] bg-zinc-900 border-r border-zinc-800 p-6 overflow-y-auto"><div class="flex items-center gap-4 mb-2"><i class="fas fa-skull-crossbones text-[68px] text-lime-500"></i><div class="leading-none"><div class="text-lime-400 text-3xl font-bold tracking-widest">KALIWINKI</div><div class="text-5xl font-black tracking-widest">MARAUDER</div></div></div><div class="bg-zinc-800 rounded-3xl p-3 mb-3"><select id="baudSelect" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-2.5 text-sm mb-2"><option value="115200" selected>115200 (standard recommended)</option><option value="921600">921600 (fast)</option><option value="460800">460800</option><option value="2000000">2 000 000</option></select><button onclick="connectSerial()" id="connectBtn" class="w-full bg-lime-600 hover:bg-lime-500 py-3 rounded-2xl font-bold text-base flex items-center justify-center gap-3"><i class="fas fa-plug"></i> CONNECT ESP32</button><button onclick="disconnectSerial()" id="disconnectBtn" class="w-full mt-2 bg-red-600 hover:bg-red-500 py-2 rounded-2xl text-sm hidden">DISCONNECT</button></div><div class="grid grid-cols-4 gap-1 mb-3"><button onclick="send('help')" class="btn bg-zinc-800 hover:bg-zinc-700 p-2.5 rounded-2xl text-xs">Help</button><button onclick="send('info')" class="btn bg-zinc-800 hover:bg-zinc-700 p-2.5 rounded-2xl text-xs">Info</button><button onclick="send('settings')" class="btn bg-zinc-800 hover:bg-zinc-700 p-2.5 rounded-2xl text-xs">Settings</button><button onclick="send('reboot')" class="btn bg-amber-600 hover:bg-amber-500 p-2.5 rounded-2xl text-xs">Reboot</button></div><div class="mb-4"><div class="flex gap-2"><select id="quickScanSelect" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-lime-300"><option value="scanap">Scan AP</option><option value="scansta">Scan STA</option><option value="scanall" selected>Scan All</option></select><button id="scanLaunchBtn" onclick="toggleScan()" class="bg-lime-600 hover:bg-lime-500 px-6 rounded-2xl font-bold text-sm w-28">Start Scan</button></div></div><div class="mb-4"><div class="flex gap-2"><select id="quickSniffSelect" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-cyan-300"><option value="sniffbeacon" selected>sniffbeacon</option><option value="sniffraw">sniffraw</option><option value="sniffprobe">sniffprobe</option><option value="sniffpwn">sniffpwn</option><option value="sniffpinescan">sniffpinescan</option><option value="sniffmultissid">sniffmultissid</option><option value="sniffesp">sniffesp</option><option value="sniffdeauth">sniffdeauth</option><option value="sniffpmkid">sniffpmkid</option><option value="sniffsae">sniffsae</option><option value="sniffskim">sniffskim</option></select><button id="sniffLaunchBtn" onclick="toggleSniff()" class="bg-cyan-600 hover:bg-cyan-500 px-6 rounded-2xl font-bold text-sm w-28">Sniff</button></div></div><div class="mb-4"><div class="flex gap-2"><select id="wifiAttackSelect" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-red-300"><option value="attack -t deauth" selected>Deauth Flood</option><option value="karma">Karma</option><option value="evilportal">Evil Portal</option><option value="clearap">Clear APs</option><option value="attack -t beacon -l">Beacon List</option><option value="attack -t beacon -r">Beacon Random</option><option value="attack -t beacon -a">Beacon AP Clone</option><option value="attack -t probe">Probe Flood</option><option value="attack -t rickroll">Rickroll</option><option value="attack -t badmsg">Bad Msg</option><option value="attack -t sleep">Sleep Attack</option><option value="attack -t sae">SAE Flood</option></select><button id="attackLaunchBtn" onclick="toggleAttack()" class="bg-red-600 hover:bg-red-500 px-6 rounded-2xl font-bold text-sm w-28">Attack</button></div></div><div class="mb-4"><div class="flex gap-2"><select id="bluetoothSelect" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-purple-300"><option value="sourapple">Sour Apple</option><option value="swiftpair">SwiftPair</option><option value="samsungblespam">Samsung BLE</option><option value="blespam -t all">blespam (all types)</option><option value="spoofat">Spoof AirTag</option><option value="sniffbt">Sniff BT</option><option value="sniffbt -t airtag">AirTag Sniff</option><option value="sniffbt -t flipper">Flipper Sniff</option><option value="sniffbt -t flock">Flock Sniff</option><option value="sniffskim">Card Skimmer</option><option value="btwardrive">BT Wardrive</option><option value="mactrack">MAC Track</option></select><button id="btLaunchBtn" onclick="toggleBT()" class="bg-purple-600 hover:bg-purple-500 px-6 rounded-2xl font-bold text-sm w-28">Start</button></div></div><div class="mb-4"><div class="flex gap-2"><select id="listSelect" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-amber-300"><option value="list -a">List APs</option><option value="list -s" selected>List SSIDs</option><option value="list -c">List Stations</option><option value="list -t">List AirTags</option><option value="list -i">List Indices</option><option value="list -p">List Probes</option></select><button onclick="runList()" class="bg-amber-600 hover:bg-amber-500 px-6 rounded-2xl font-bold text-sm w-28">Run</button></div></div><div class="mb-4"><div class="flex gap-2 items-center"><select id="selectTarget" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-rose-300"><option value="all" selected>Select all</option><option value="ap">select ap</option><option value="ssid">select ssid</option><option value="sta">select sta</option></select><input id="selectIndex" value="all" placeholder="all/n°" class="w-16 bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-rose-300 text-center text-sm"><button onclick="runSelect()" class="bg-rose-600 hover:bg-rose-500 px-6 rounded-2xl font-bold text-sm w-28 h-14">Select</button></div></div><div class="mb-4 bg-zinc-800 rounded-3xl p-4"><select id="wifiGeneralSelect" onchange="updateFields()" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-emerald-300 mb-4"><option value="">WiFi General action</option><option value="generate">Generate SSIDs</option><option value="select-probe">select probe ssid</option><option value="add">add ssids</option><option value="clear-ssids">clear ssids</option><option value="clear-aps">clear aps</option><option value="clear-stations">clear stations</option><option value="select-ep-html">select ep html files</option><option value="select-ap">select ap</option><option value="view-info">view ap info</option><option value="select-stations">select stations</option><option value="join">join wifi</option><option value="join-saved">join saved wifi</option><option value="start-ap">start ap</option><option value="set-mac">set mac</option><option value="shutdown">shutdown wifi</option><option value="cloneapmac">Clone AP Mac</option><option value="clonestamac">Clone STA Mac</option><option value="randstamac">Random STA Mac</option><option value="clearlist">Clear List</option></select><div id="fieldIndex" class="hidden mb-3"><label class="block text-xs text-zinc-400 mb-1">Index</label><input id="inputIndex" type="number" placeholder="ex: 3" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-3"></div><div id="fieldCount" class="hidden mb-3"><label class="block text-xs text-zinc-400 mb-1">Count</label><input id="inputCount" type="number" value="10" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-3"></div><div id="fieldName" class="hidden mb-3"><label class="block text-xs text-zinc-400 mb-1">Name / SSID</label><input id="inputName" placeholder="MyNetwork" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-3"></div><div id="fieldPassword" class="hidden mb-3"><label class="block text-xs text-zinc-400 mb-1">Password</label><input id="inputPassword" type="password" placeholder="••••••••" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-3"></div><div id="fieldFilename" class="hidden mb-3"><label class="block text-xs text-zinc-400 mb-1">HTML Filename</label><input id="inputFilename" placeholder="portal.html" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-3"></div><button onclick="executeWifiGeneral()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-2xl font-bold text-lg">EXECUTE</button></div><div class="mb-4 bg-zinc-800 rounded-3xl p-4"><select id="toolsSelect" onchange="updateToolsFields()" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-sky-300 mb-4"><option value="">Tools action</option><option value="update">Update Firmware</option><option value="led">LED Control</option><option value="ls">List SD Files</option><option value="channel">Set Channel</option><option value="gps-advanced">GPS Advanced</option><option value="nmea">NMEA Output</option><option value="gpspoi">GPS POI</option><option value="gpstracker">GPS Tracker</option><option value="select-filter">Advanced Select Filter</option><option value="pingscan">Ping Scan</option><option value="arpscan">ARP Scan</option><option value="portscan">Port Scan</option></select><div id="toolsFieldChannel" class="hidden mb-3"><label class="block text-xs text-zinc-400 mb-1">Channel (1-13)</label><input id="inputChannel" type="number" min="1" max="13" placeholder="6" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-3"></div><div id="toolsFieldLed" class="hidden mb-3"><label class="block text-xs text-zinc-400 mb-1">LED (hex ou rainbow)</label><input id="inputLed" placeholder="#00FF00 ou rainbow" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-3"></div><div id="toolsFieldGps" class="hidden mb-3"><label class="block text-xs text-zinc-400 mb-1">GPS Subcommand</label><select id="inputGpsSub" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-3"><option value="fix">fix</option><option value="sat">sat</option><option value="lon">lon</option><option value="lat">lat</option><option value="alt">alt</option><option value="date">date</option><option value="accuracy">accuracy</option><option value="text">text</option><option value="nmea">nmea</option></select></div><div id="toolsFieldFilter" class="hidden mb-3"><label class="block text-xs text-zinc-400 mb-1">Filter (equals ou contains)</label><input id="inputFilter" placeholder='equals "MyAP" ou contains "Free"' class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-3"></div><button onclick="executeTools()" class="w-full bg-sky-600 hover:bg-sky-500 py-3 rounded-2xl font-bold text-lg">EXECUTE</button></div><div class="mb-8"><button onclick="send('gpsdata')" class="w-full bg-emerald-600 hover:bg-emerald-500 py-2.5 rounded-2xl text-xs font-bold flex items-center justify-center gap-2"><i class="fas fa-location-dot"></i> GPS DATA</button></div><div class="text-center text-xs text-zinc-500">Made with ❤️ by <a href="https://github.com/kaliwinki-1" target="_blank" class="text-lime-400 hover:underline">KALIWINKI</a><br><a href="https://github.com/kaliwinki-1" target="_blank" class="text-lime-400 hover:underline">github.com/kaliwinki-1</a></div></div><div class="flex-1 flex flex-col relative"><div class="bg-zinc-900 border-b border-zinc-800 px-8 py-5 flex justify-between items-center"><span id="portStatus" class="text-emerald-400 font-bold text-lg">Ready to connect</span><button onclick="clearTerminal()" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">Clear Terminal</button></div><div id="terminal" class="terminal flex-1 p-8 overflow-y-auto text-lime-400 text-sm leading-relaxed whitespace-pre-wrap"></div><button id="scrollToBottomBtn" onclick="scrollToBottom()" class="hidden">↓</button><div class="bg-zinc-900 border-t border-zinc-800 p-6"><div class="flex gap-3"><input id="cmdInput" placeholder="Custom command..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 focus:border-lime-500 outline-none"><button onclick="sendCustom()" class="bg-lime-600 hover:bg-lime-500 px-12 rounded-3xl font-bold">SEND</button></div></div></div></div><script>let p=null,w=null,r=null,c=false,b='';let a=true;let ir=false;const t=document.getElementById('terminal');const sb=document.getElementById('scrollToBottomBtn');function lg(txt,col='lime'){const el=document.createElement('div');el.className=`text-${col}-400`;el.textContent=`> ${txt}`;t.appendChild(el);if(a)t.scrollTop=t.scrollHeight} t.addEventListener('scroll',()=>{const threshold=40;const isAtBottom=Math.abs(t.scrollHeight-t.scrollTop-t.clientHeight)<threshold;a=isAtBottom;sb.style.display=a?'none':'flex'});function scrollToBottom(){t.scrollTop=t.scrollHeight;a=true;sb.style.display='none'}async function connectSerial(){try{p=await navigator.serial.requestPort();const baud=parseInt(document.getElementById('baudSelect').value);await p.open({baudRate:baud});w=p.writable.getWriter();r=p.readable.getReader();c=true;document.getElementById('connectBtn').classList.add('hidden');document.getElementById('disconnectBtn').classList.remove('hidden');document.getElementById('portStatus').textContent=`ESP32 @${baud}`;lg(`=== CONNECTED AT ${baud} BAUD - ALL COMMANDS READY ===`,'emerald');readLoop()}catch(e){lg('Error: '+e.message,'red')}}async function disconnectSerial(){if(r)r.cancel();if(w)w.releaseLock();if(p)await p.close();c=false;document.getElementById('connectBtn').classList.remove('hidden');document.getElementById('disconnectBtn').classList.add('hidden');document.getElementById('portStatus').textContent=`Ready to connect`;lg('Disconnected','amber')}async function readLoop(){const decoder=new TextDecoder();while(true){try{const{value,done}=await r.read();if(done)break;b+=decoder.decode(value,{stream:true});let lines=b.split(/\r?\n/);b=lines.pop()||'';for(let line of lines){if(line.trim())lg(line.trim(),'zinc')}if(a)t.scrollTop=t.scrollHeight}catch(e){break}}}async function send(cmd){if(!c){lg('⚠️ Connect the ESP32 first!','red');return}await w.write(new TextEncoder().encode(cmd+'\r\n'));lg(cmd,'lime')}function toggleScan(){handleToggle('scanLaunchBtn',document.getElementById('quickScanSelect').value,'Start Scan','bg-lime-600')}function toggleSniff(){handleToggle('sniffLaunchBtn',document.getElementById('quickSniffSelect').value,'Sniff','bg-cyan-600')}function toggleAttack(){handleToggle('attackLaunchBtn',document.getElementById('wifiAttackSelect').value,'Attack','bg-red-600')}function toggleBT(){handleToggle('btLaunchBtn',document.getElementById('bluetoothSelect').value,'Start','bg-purple-600')}function handleToggle(btnId,val,originalText,originalColor){const btn=document.getElementById(btnId);if(!ir){if(val)send(val);ir=true;btn.textContent=btnId==='attackLaunchBtn'?'Stop Attack':btnId==='sniffLaunchBtn'?'Stop Sniff':btnId==='btLaunchBtn'?'Stop':'Stop Scan';btn.classList.remove(originalColor);btn.classList.add('bg-red-600')}else{send('stopscan');ir=false;resetAllButtons()}}function resetAllButtons(){const buttons=[{id:'scanLaunchBtn',text:'Start Scan',color:'bg-lime-600'},{id:'sniffLaunchBtn',text:'Sniff',color:'bg-cyan-600'},{id:'attackLaunchBtn',text:'Attack',color:'bg-red-600'},{id:'btLaunchBtn',text:'Start',color:'bg-purple-600'}];buttons.forEach(b=>{const el=document.getElementById(b.id);el.textContent=b.text;el.classList.remove('bg-red-600');el.classList.add(b.color)})}function runList(){const val=document.getElementById('listSelect').value;if(val)send(val)}function runSelect(){const type=document.getElementById('selectTarget').value;let idx=document.getElementById('selectIndex').value.trim();if(!idx)idx='all';let cmd='';if(type==='all')cmd='select -a all';else if(type==='ap')cmd=idx==='all'?'select -a':`select -a ${idx}`;else if(type==='ssid')cmd=idx==='all'?'select -s':`select -s ${idx}`;else if(type==='sta')cmd=idx==='all'?'select -c':`select -c ${idx}`;if(cmd)send(cmd)}function updateFields(){const action=document.getElementById('wifiGeneralSelect').value;document.getElementById('fieldIndex').classList.add('hidden');document.getElementById('fieldCount').classList.add('hidden');document.getElementById('fieldName').classList.add('hidden');document.getElementById('fieldPassword').classList.add('hidden');document.getElementById('fieldFilename').classList.add('hidden');switch(action){case'generate':document.getElementById('fieldCount').classList.remove('hidden');break;case'add':document.getElementById('fieldName').classList.remove('hidden');break;case'select-ap':case'view-info':case'select-stations':case'cloneapmac':case'clonestamac':document.getElementById('fieldIndex').classList.remove('hidden');break;case'join':document.getElementById('fieldIndex').classList.remove('hidden');document.getElementById('fieldPassword').classList.remove('hidden');break;case'select-ep-html':document.getElementById('fieldFilename').classList.remove('hidden');break}}function executeWifiGeneral(){const action=document.getElementById('wifiGeneralSelect').value;if(!action)return;const index=document.getElementById('inputIndex').value.trim();const count=document.getElementById('inputCount').value.trim();const name=document.getElementById('inputName').value.trim();const pass=document.getElementById('inputPassword').value.trim();const file=document.getElementById('inputFilename').value.trim();let cmd='';switch(action){case'generate':cmd=`ssid -a -g ${count||10}`;break;case'select-probe':cmd='select -p';break;case'add':cmd=`ssid -a -n "${name}"`;break;case'clear-ssids':cmd='clearlist -s';break;case'clear-aps':cmd='clearap';break;case'clear-stations':cmd='clearlist -c';break;case'select-ep-html':cmd=`evilportal sethtml ${file||'portal.html'}`;break;case'select-ap':cmd=`select -a ${index}`;break;case'view-info':cmd=`info -a ${index}`;break;case'select-stations':cmd=`select -c ${index}`;break;case'join':cmd=`join -a ${index} -p ${pass}`;break;case'join-saved':cmd='join -s';break;case'start-ap':cmd='karma';break;case'set-mac':cmd='randapmac';break;case'shutdown':cmd='stopscan';break;case'cloneapmac':cmd=index?`cloneapmac -a ${index}`:'cloneapmac';break;case'clonestamac':cmd=index?`clonestamac -s ${index}`:'clonestamac';break;case'randstamac':cmd='randstamac';break;case'clearlist':cmd='clearlist';break}if(cmd)send(cmd)}function updateToolsFields(){const action=document.getElementById('toolsSelect').value;document.getElementById('toolsFieldChannel').classList.add('hidden');document.getElementById('toolsFieldLed').classList.add('hidden');document.getElementById('toolsFieldGps').classList.add('hidden');document.getElementById('toolsFieldFilter').classList.add('hidden');if(action==='channel')document.getElementById('toolsFieldChannel').classList.remove('hidden');if(action==='led')document.getElementById('toolsFieldLed').classList.remove('hidden');if(action==='gps-advanced')document.getElementById('toolsFieldGps').classList.remove('hidden');if(action==='select-filter')document.getElementById('toolsFieldFilter').classList.remove('hidden')}function executeTools(){const action=document.getElementById('toolsSelect').value;if(!action)return;let cmd='';switch(action){case'update':cmd='update';break;case'ls':cmd='ls';break;case'nmea':cmd='nmea';break;case'gpspoi':cmd='gpspoi -s';break;case'gpstracker':cmd='gpstracker -c start';break;case'channel':const ch=document.getElementById('inputChannel').value.trim();cmd=ch?`channel -s ${ch}`:'channel';break;case'led':const ledVal=document.getElementById('inputLed').value.trim();cmd=ledVal.toLowerCase()==='rainbow'?'led -p rainbow':`led -s ${ledVal}`;break;case'gps-advanced':const sub=document.getElementById('inputGpsSub').value;cmd=`gps -t ${sub}`;break;case'select-filter':const filt=document.getElementById('inputFilter').value.trim();cmd=filt?`select -a -f "${filt}"`:'select -a';break;default:cmd=action}if(cmd)send(cmd)}function sendCustom(){const input=document.getElementById('cmdInput');if(input.value.trim())send(input.value.trim());input.value=''}function clearTerminal(){t.innerHTML=''}document.getElementById('cmdInput').addEventListener('keypress',e=>{if(e.key==='Enter')sendCustom()});setTimeout(()=>{lg('=== KALIWINKI MARAUDER ===','emerald');lg('Tools dynamique + clonestamac intégré • Tout collé au max ✅','emerald')},400);</script></body></html>
